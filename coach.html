<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişim ve Takip Günlüğüm</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #FFD700; /* Altın/Başarı Rengi */
            --accent: #4facfe; /* Canlı Mavi */
            --text-dark: #2d3436;
            --text-gray: #636e72;
            --success: #00b894;
            --danger: #d63031;
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* --- Açılış Ekranı (Splash) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease-out; text-align: center; padding: 20px;
        }
        #splash-screen h1 { font-size: 3rem; color: var(--primary); text-shadow: 0 0 20px rgba(255,215,0,0.5); margin-bottom: 10px; }
        #splash-screen p { font-size: 1.3rem; font-weight: 300; opacity: 0.9; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-top: 30px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Header & Profil Bölümü --- */
        .glass-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px;
            position: sticky; top: 0; z-index: 100;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; color: white; }
        .header-top h2 { font-weight: 800; display: flex; align-items: center; gap: 10px; }
        
        .student-profile {
            display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 50px;
        }
        .student-profile input {
            background: transparent; border: none; color: white; font-size: 1.1rem; font-weight: 700; width: 200px; outline: none;
        }
        .student-profile input::placeholder { color: rgba(255,255,255,0.6); }
        .student-profile input:focus { border-bottom: 1px solid var(--primary); }

        /* Progress Bar */
        .progress-container { width: 100%; background: rgba(255,255,255,0.2); border-radius: 10px; height: 10px; overflow: hidden; margin-top: 5px; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-text { color: white; font-size: 0.85rem; font-weight: 600; text-align: right; margin-top: 5px; }

        /* --- Ana İçerik Konteyneri --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 40px; }

        /* --- Gün Kartları (Glassmorphism & Soft UI) --- */
        .day-card {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            border-top: 5px solid var(--accent);
            transition: transform 0.3s;
        }
        .day-card:hover { transform: translateY(-5px); }

        .day-header {
            background: linear-gradient(90deg, #f8f9fa, #e9ecef);
            padding: 20px 25px; font-size: 1.6rem; font-weight: 800; color: var(--text-dark);
            display: flex; justify-content: space-between; align-items: center;
        }

        .hours-grid { padding: 25px; display: flex; flex-direction: column; gap: 20px; }

        /* --- Ders Blokları --- */
        .hour-block {
            background: #ffffff; border: 2px solid #f1f2f6; border-radius: 15px; padding: 20px;
            display: grid; grid-template-columns: 1fr; gap: 15px; transition: border-color 0.3s;
            position: relative;
        }
        .hour-block.completed { border-color: var(--success); background: #f8fff9; }

        .block-header { display: flex; justify-content: space-between; align-items: center; }
        .time-badge { background: var(--accent); color: white; padding: 5px 15px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; }
        .subject-title { font-size: 1.3rem; font-weight: 800; color: var(--text-dark); display: flex; align-items: center; gap: 10px; }
        
        /* Checkbox (Tamamladım Butonu) */
        .complete-btn {
            background: #dfe6e9; color: var(--text-gray); border: none; padding: 8px 15px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s;
        }
        .hour-block.completed .complete-btn { background: var(--success); color: white; }

        /* Form Elemanları */
        .input-row { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        @media(max-width: 768px) { .input-row { grid-template-columns: 1fr; } }
        
        label { font-size: 0.9rem; font-weight: 700; color: var(--text-gray); margin-bottom: 5px; display: block; }
        input[type="text"], input[type="number"], textarea {
            width: 100%; padding: 12px 15px; border: 2px solid #ecf0f1; border-radius: 10px;
            font-size: 1rem; font-family: 'Nunito', sans-serif; transition: all 0.3s; background: #fafbfc;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); background: white; box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2); }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .stats-grid input { text-align: center; font-weight: 800; font-size: 1.1rem; }
        
        textarea { resize: vertical; min-height: 80px; }

        /* --- Rehberlik: Gün Sonu Değerlendirmesi --- */
        .daily-reflection { background: #fff3cd; margin: 0 25px 25px 25px; padding: 20px; border-radius: 15px; border-left: 5px solid var(--primary); }
        .reflection-title { font-weight: 800; margin-bottom: 15px; color: #856404; display: flex; align-items: center; gap: 10px; }
        .emoji-selector { display: flex; gap: 15px; justify-content: space-around; margin-bottom: 10px; }
        .emoji-btn { font-size: 2rem; background: none; border: none; cursor: pointer; filter: grayscale(100%); transition: all 0.2s; transform: scale(0.9); }
        .emoji-btn:hover { filter: grayscale(0%); transform: scale(1.1); }
        .emoji-btn.active { filter: grayscale(0%); transform: scale(1.2); }

        /* --- Floating Action Bar (Mobil ve Masaüstü Uyumlu Alt Bar) --- */
        .fab-container {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 15px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 15px; z-index: 1000;
        }
        .fab-btn {
            padding: 12px 25px; border: none; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: all 0.2s; color: white;
        }
        .fab-btn:active { transform: scale(0.95); }
        #btn-save { background: linear-gradient(135deg, var(--success), #00cec9); flex-grow: 1; max-width: 400px; justify-content: center; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0, 184, 148, 0.4); }
        #btn-save:hover { background: linear-gradient(135deg, #00a885, #00b894); }
        #btn-reset { background: var(--danger); }

        /* --- Toast Bildirimi --- */
        #toast {
            position: fixed; top: 20px; right: 20px; background: white; color: var(--text-dark); padding: 15px 25px; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateX(150%); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10000; font-weight: 700; display: flex; align-items: center; gap: 10px; border-left: 5px solid var(--success);
        }
        #toast.show { transform: translateX(0); opacity: 1; }

        @media (max-width: 768px) {
            .header-top { flex-direction: column; gap: 15px; }
            .student-profile { width: 100%; justify-content: center; }
            .student-profile input { text-align: center; }
            .fab-container { padding: 10px; }
            .fab-btn { padding: 10px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>✨ Hoş Geldin Şampiyon!</h1>
        <p id="quote-text">Seni harika bir gün bekliyor...</p>
        <div class="loader"></div>
    </div>

    <header class="glass-header">
        <div class="header-top">
            <h2>🌙 Kamp Programım</h2>
            <div class="student-profile">
                <span>👤</span>
                <input type="text" id="student_name" placeholder="Adın Soyadın..." oninput="updateProgress()">
            </div>
        </div>
        <div>
            <div class="progress-text">Program İlerlemesi: <span id="progress-percent">%0</span></div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </header>

    <div class="container" id="schedule-container"></div>

    <div class="fab-container">
        <button class="fab-btn" id="btn-reset">🔄 Temizle</button>
        <button class="fab-btn" id="btn-save">🚀 Kaydet ve Öğretmene Gönder</button>
    </div>

    <div id="toast">✅ İşlem başarılı!</div>

    <script>
        // --- BURAYA KOPYALADIĞINIZ GOOGLE LİNKİNİ YAPIŞTIRIN ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwPLYlWJcdLBLLgLzZxhrZUvRmGA-r4uE2Bc3x5dMrcpPsLayysx-nqRseHLinugHa0/exec'; 

        const quotes = [
            "Oruç bedeni dinlendirir, zihni keskinleştirir. Başarılar!",
            "Eksiklerini görmek zayıflık değil, şampiyonluğun ilk adımıdır.",
            "Bugünün emeği, yarının rahatlığıdır. Sen yaparsın!",
            "Zorluklar seni durdurmak için değil, güçlendirmek içindir."
        ];

        const schedulePlan = [
            { day: 1, subjects: ["Türkçe", "Matematik", "İngilizce"] },
            { day: 2, subjects: ["Fen Bilimleri", "Sosyal Bilgiler", "Matematik"] },
            { day: 3, subjects: ["İngilizce", "Türkçe", "Din Kültürü"] },
            { day: 4, subjects: ["Matematik", "Fen Bilimleri", "Sosyal Bilgiler"] },
            { day: 5, subjects: ["Türkçe", "İngilizce", "Matematik"] },
            { day: 6, subjects: ["Fen Bilimleri", "Sosyal Bilgiler", "Türkçe"] },
            { day: 7, subjects: ["İngilizce", "Matematik", "Genel Tekrar"] }
        ];

        const timeSlots = [
            { label: "1. Kısım (Öğleden Sonra)", desc: "Video Konu İzleme & Not Alma", icon: "☀️" },
            { label: "2. Kısım (İftara Doğru)", desc: "Öğrenilenleri Hafif Tekrar", icon: "🌇" },
            { label: "3. Kısım (İftar Sonrası)", desc: "Soru Çözümü & Test", icon: "🌙" }
        ];

        const moodEmojis = [
            { id: "great", icon: "🤩", label: "Harika" },
            { id: "good", icon: "🙂", label: "İyi" },
            { id: "tired", icon: "🥱", label: "Yorgun" },
            { id: "hard", icon: "😫", label: "Zorlandım" }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            showSplashScreen();
            renderSchedule();
            loadData();
            setupEventListeners();
            updateProgress();
        });

        function showSplashScreen() {
            const splash = document.getElementById("splash-screen");
            document.getElementById("quote-text").innerText = quotes[Math.floor(Math.random() * quotes.length)];
            setTimeout(() => {
                splash.style.opacity = "0";
                setTimeout(() => splash.style.display = "none", 800);
            }, 2500);
        }

        function renderSchedule() {
            const container = document.getElementById("schedule-container");
            let html = "";

            schedulePlan.forEach((dayPlan) => {
                html += `
                <div class="day-card">
                    <div class="day-header">
                        <span>🗓️ ${dayPlan.day}. Gün</span>
                    </div>
                    <div class="hours-grid">
                `;

                dayPlan.subjects.forEach((subject, hourIndex) => {
                    const idPrefix = `d${dayPlan.day}_h${hourIndex}`;
                    html += `
                        <div class="hour-block" id="block_${idPrefix}">
                            <div class="block-header">
                                <div class="time-badge">${timeSlots[hourIndex].icon} ${timeSlots[hourIndex].label}</div>
                                <button class="complete-btn" onclick="toggleComplete('${idPrefix}')" id="btn_comp_${idPrefix}">⚪ Başlamadı</button>
                            </div>
                            <div class="subject-title">📚 ${subject}</div>
                            
                            <div class="input-row">
                                <div>
                                    <label>Çalışılan Konu (${timeSlots[hourIndex].desc}):</label>
                                    <input type="text" id="${idPrefix}_topic" placeholder="Hangi konuyu çalıştın?" oninput="updateProgress()">
                                </div>
                                <div class="stats-grid">
                                    <div><label style="color: var(--success)">Doğru</label><input type="number" id="${idPrefix}_correct" placeholder="0"></div>
                                    <div><label style="color: var(--danger)">Yanlış</label><input type="number" id="${idPrefix}_wrong" placeholder="0"></div>
                                    <div><label style="color: var(--text-gray)">Boş</label><input type="number" id="${idPrefix}_empty" placeholder="0"></div>
                                </div>
                            </div>
                            
                            <div>
                                <label>Öğretmenime / Kendime Notlar:</label>
                                <textarea id="${idPrefix}_notes" placeholder="Anlamadığın bir formül veya soru tipi var mı? Buraya yaz..."></textarea>
                            </div>
                        </div>
                    `;
                });

                // Rehberlik: Gün Sonu Değerlendirmesi
                html += `
                    </div>
                    <div class="daily-reflection">
                        <div class="reflection-title">🧠 Günün Değerlendirmesi</div>
                        <label style="text-align:center; margin-bottom:10px;">Bugün oruçluyken ve çalışırken genel olarak nasıl hissettin?</label>
                        <div class="emoji-selector" id="mood_container_d${dayPlan.day}">
                            ${moodEmojis.map(m => `<button class="emoji-btn" onclick="selectMood(${dayPlan.day}, '${m.id}', '${m.label}')" id="mood_${dayPlan.day}_${m.id}" title="${m.label}">${m.icon}</button>`).join('')}
                        </div>
                        <input type="hidden" id="d${dayPlan.day}_mood_val" value="">
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // Tamamlandı Butonu Mantığı
        window.toggleComplete = function(idPrefix) {
            const block = document.getElementById(`block_${idPrefix}`);
            const btn = document.getElementById(`btn_comp_${idPrefix}`);
            block.classList.toggle('completed');
            if(block.classList.contains('completed')) {
                btn.innerText = "✅ Tamamlandı";
                btn.style.background = "var(--success)"; btn.style.color = "white";
            } else {
                btn.innerText = "⚪ Başlamadı";
                btn.style.background = "#dfe6e9"; btn.style.color = "var(--text-gray)";
            }
            updateProgress();
        };

        // Mod Seçme Mantığı
        window.selectMood = function(day, moodId, label) {
            const container = document.getElementById(`mood_container_d${day}`);
            container.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mood_${day}_${moodId}`).classList.add('active');
            document.getElementById(`d${day}_mood_val`).value = label;
            updateProgress();
        };

        function updateProgress() {
            const totalInputs = document.querySelectorAll('input[type="text"][id$="_topic"]').length;
            let filledInputs = 0;
            document.querySelectorAll('input[type="text"][id$="_topic"]').forEach(input => {
                if(input.value.trim() !== "") filledInputs++;
            });
            
            const percentage = Math.round((filledInputs / totalInputs) * 100);
            document.getElementById("progress-bar").style.width = `${percentage}%`;
            document.getElementById("progress-percent").innerText = `%${percentage}`;
            saveToLocal(); // Her yazmada arka planda kaydet
        }

        function saveToLocal() {
            const inputs = document.querySelectorAll("input, textarea");
            const state = {};
            inputs.forEach(input => {
                // Tamamlandı durumlarını da kaydetmek için
                state[input.id] = input.value;
            });
            
            // Tamamlanan sınıfları kaydet
            const completedBlocks = [];
            document.querySelectorAll('.hour-block.completed').forEach(block => completedBlocks.push(block.id));
            state['completedBlocks'] = completedBlocks;
            
            // Aktif Emojileri kaydet
            const activeEmojis = [];
            document.querySelectorAll('.emoji-btn.active').forEach(btn => activeEmojis.push(btn.id));
            state['activeEmojis'] = activeEmojis;

            localStorage.setItem("ramadanSchedulePro", JSON.stringify(state));
        }

        function loadData() {
            const savedData = localStorage.getItem("ramadanSchedulePro");
            if (savedData) {
                const state = JSON.parse(savedData);
                document.querySelectorAll("input, textarea").forEach(input => {
                    if (state[input.id] !== undefined) input.value = state[input.id];
                });
                
                if(state['completedBlocks']) {
                    state['completedBlocks'].forEach(id => {
                        const block = document.getElementById(id);
                        if(block) {
                            block.classList.add('completed');
                            const btn = block.querySelector('.complete-btn');
                            btn.innerText = "✅ Tamamlandı";
                            btn.style.background = "var(--success)"; btn.style.color = "white";
                        }
                    });
                }

                if(state['activeEmojis']) {
                    state['activeEmojis'].forEach(id => {
                        const btn = document.getElementById(id);
                        if(btn) btn.classList.add('active');
                    });
                }
            }
        }

        function generateTeacherLog() {
            const studentName = document.getElementById("student_name").value || "İsimsiz Öğrenci";
            let logText = `🎓 ÖĞRENCİ: ${studentName.toUpperCase()}\n`;
            logText += `📊 GENEL İLERLEME: ${document.getElementById("progress-percent").innerText}\n`;
            logText += `-----------------------------------\n`;

            schedulePlan.forEach((dayPlan) => {
                let dayHasData = false;
                let dayLog = `📌 ${dayPlan.day}. GÜN:\n`;
                
                dayPlan.subjects.forEach((subject, hourIndex) => {
                    const idPrefix = `d${dayPlan.day}_h${hourIndex}`;
                    const topic = document.getElementById(`${idPrefix}_topic`).value;
                    const correct = document.getElementById(`${idPrefix}_correct`).value;
                    const wrong = document.getElementById(`${idPrefix}_wrong`).value;
                    const empty = document.getElementById(`${idPrefix}_empty`).value;
                    const notes = document.getElementById(`${idPrefix}_notes`).value;
                    const isCompleted = document.getElementById(`block_${idPrefix}`).classList.contains('completed') ? "✅" : "⏳";
                    
                    if (topic || correct || wrong || empty || notes) {
                        dayHasData = true;
                        dayLog += `  ${isCompleted} [${subject}] Konu: ${topic || '-'} | D:${correct||0} Y:${wrong||0} B:${empty||0}\n`;
                        if(notes) dayLog += `     ↳ Not: ${notes}\n`;
                    }
                });

                const mood = document.getElementById(`d${dayPlan.day}_mood_val`).value;
                if(mood) {
                    dayLog += `  🧠 Günün Modu: ${mood}\n`;
                    dayHasData = true;
                }

                if(dayHasData) logText += dayLog + `-----------------------------------\n`;
            });
            return logText;
        }

        function submitToTeacher() {
            const studentName = document.getElementById("student_name").value.trim();
            if(!studentName) {
                alert("Lütfen önce yukarıya adını ve soyadını yaz! Öğretmenin kim olduğunu bilmeli 😊");
                document.getElementById("student_name").focus();
                return;
            }

            const readableLog = generateTeacherLog();
            
            if (scriptURL.includes("script.google.com")) {
                showToast("⏳ Veriler öğretmene gönderiliyor...");
                
                fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ log: readableLog })
                }).then(() => {
                    showToast("🚀 Harika! Çalışmaların öğretmenine ulaştı.");
                }).catch(error => {
                    showToast("❌ Cihaza kaydedildi ama internet sorunu yaşandı.");
                });
            } else {
                showToast("💾 Cihaza kaydedildi. (Öğretmen bağlantı kodu eksik)");
            }
        }

        function resetSchedule() {
            if(confirm("Tüm yazdıkların silinecek ve sıfırdan başlayacaksın. Emin misin?")) {
                localStorage.removeItem("ramadanSchedulePro");
                location.reload(); // Sayfayı yenilemek en temizi
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 3500);
        }

        function setupEventListeners() {
            document.getElementById("btn-save").addEventListener("click", submitToTeacher);
            document.getElementById("btn-reset").addEventListener("click", resetSchedule);
        }
    </script>
</body>
</html>
