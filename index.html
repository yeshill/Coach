<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobby LGS Koçu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; font-family: sans-serif; }
        .locked-card { opacity: 0.6; pointer-events: none; filter: grayscale(1); position: relative; }
        .locked-card::after { content: '🔒'; position: absolute; top: 10px; right: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Kendi E-Tablo bağlantınız (Sizin paylaştığınız link eklendi)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxAR1NFhHbFecZUmnYe_7jYuN00vGEMHYJT6W-HsdCTdf5cwHDSVye1YcYpIIHx1MIR6g/exec";

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [program, setProgram] = useState({});
            const [editMode, setEditMode] = useState(false);
            const [customSubjects, setCustomSubjects] = useState(["Türkçe", "Matematik", "Fen", "İngilizce", "Sosyal", "Din"]);
            const [formData, setFormData] = useState({ name: '', class: '8', no: '' });
            const [errorMessage, setErrorMessage] = useState("");

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setErrorMessage("");
                
                try {
                    const resp = await fetch(`${SCRIPT_URL}?no=${formData.no}&class=${formData.class}`);
                    const textResp = await resp.text();
                    
                    try {
                        const result = JSON.parse(textResp);
                        if (result.status === "found") {
                            const saved = JSON.parse(result.data);
                            setProgram(saved.activities || {});
                            setCustomSubjects(saved.subjects || customSubjects);
                        }
                        setUser(formData);
                    } catch (parseError) {
                        setErrorMessage("Google E-Tablo'ya ulaşılamadı. 'Erişimi Olanlar: Herkes' ayarını kontrol edin veya Gizli Sekme'de deneyin.");
                    }
                } catch (err) {
                    setErrorMessage("İnternet bağlantısı kurulamadı. Dobby üzgün... Miyav!");
                } finally { 
                    setLoading(false); 
                }
            };

            const saveToCloud = async (newProg, newSubs) => {
                const data = { ...user, state: { activities: newProg, subjects: newSubs } };
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                } catch (e) { 
                    console.error("Kayıt işlemi başarısız oldu."); 
                }
            };

            const updateCell = (day, idx, val) => {
                const newProg = { ...program, [`day${day}_sub${idx}`]: val };
                setProgram(newProg);
                saveToCloud(newProg, customSubjects);
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700 text-center">
                            <div className="text-7xl mb-6">🐈‍⬛</div>
                            <h1 className="text-2xl font-bold text-yellow-500 mb-6">Dobby Koçluk Girişi</h1>
                            
                            {errorMessage && (
                                <div className="bg-red-900/50 border border-red-500 text-red-200 p-3 rounded-lg text-sm mb-4">
                                    {errorMessage}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-4">
                                <input required placeholder="Ad Soyad" className="w-full bg-slate-900 p-4 rounded-xl outline-none border border-slate-700 focus:border-yellow-500" onChange={e => setFormData({...formData, name: e.target.value})} />
                                <div className="flex gap-4">
                                    <select className="flex-1 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white" onChange={e => setFormData({...formData, class: e.target.value})}>
                                        <option value="8">8. Sınıf (LGS)</option>
                                        <option value="7">7. Sınıf</option>
                                        <option value="6">6. Sınıf</option>
                                        <option value="5">5. Sınıf</option>
                                    </select>
                                    <input required type="number" placeholder="No" className="flex-1 bg-slate-900 p-4 rounded-xl border border-slate-700 text-white" onChange={e => setFormData({...formData, no: e.target.value})} />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl hover:bg-yellow-400">
                                    {loading ? "Bağlanıyor..." : "Giriş Yap"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const currentDay = new Date().getDay() === 0 ? 7 : new Date().getDay();

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center mb-8 bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <div className="flex items-center gap-4">
                            <div className="text-4xl">🐈‍⬛</div>
                            <div>
                                <h2 className="text-xl font-bold text-yellow-500">{user.name}</h2>
                                <p className="text-xs text-slate-400">{user.class}. Sınıf Maratonu</p>
                            </div>
                        </div>
                        <button onClick={() => setEditMode(!editMode)} className="bg-slate-700 px-4 py-2 rounded-xl text-xs hover:bg-slate-600 transition-colors">
                            {editMode ? "Değişiklikleri Kaydet" : "Ders İsimlerini Düzenle"}
                        </button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-7 gap-4">
                        {[1, 2, 3, 4, 5, 6, 7].map(day => (
                            <div key={day} className={`bg-slate-800 p-4 rounded-2xl border ${day === currentDay ? 'border-yellow-500 ring-1 ring-yellow-500/50 scale-105' : 'border-slate-700'} ${day < currentDay ? 'locked-card' : ''}`}>
                                <h3 className="text-center font-bold mb-4 text-sm">{day}. GÜN</h3>
                                <div className="space-y-4">
                                    {customSubjects.map((sub, idx) => (
                                        <div key={idx}>
                                            {editMode ? (
                                                <input value={sub} className="w-full bg-slate-900 text-xs p-2 rounded border border-slate-700 text-white mb-1" onChange={e => {
                                                    const n = [...customSubjects]; 
                                                    n[idx] = e.target.value;
                                                    setCustomSubjects(n); 
                                                    saveToCloud(program, n);
                                                }} />
                                            ) : (
                                                <label className="text-[10px] text-slate-400 block mb-1 font-bold uppercase">{sub}</label>
                                            )}
                                            <input type="number" placeholder="Soru Sayısı" className="w-full bg-slate-900 p-2 rounded-lg text-xs outline-none focus:ring-1 ring-yellow-500 text-white" 
                                                value={program[`day${day}_sub${idx}`] || ''}
                                                onChange={e => updateCell(day, idx, e.target.value)} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
