<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobby LGS & Ders Koçu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; }
        .locked-card { opacity: 0.5; pointer-events: none; filter: grayscale(0.8); position: relative; }
        .locked-card::after { content: '🔒'; position: absolute; top: 10px; right: 10px; font-size: 1.2rem; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        

        // --- BURAYA GOOGLE SCRIPT URL'NİZİ YAPIŞTIRIN ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfZyUMrHH2qpd8epa95tlZcW6v2hbbeXemipKJhgjF35yIe5ZRFLsnzD4yhfgJTulzOw/exec";

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [program, setProgram] = useState({});
            const [editMode, setEditMode] = useState(false);
            const [customSubjects, setCustomSubjects] = useState(["Türkçe", "Matematik", "Fen Bilimleri", "İngilizce", "Sosyal", "Din Kültürü"]);
            const [formData, setFormData] = useState({ name: '', class: '8', no: '' });

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const resp = await fetch(`${SCRIPT_URL}?no=${formData.no}&class=${formData.class}`);
                    const result = await resp.json();
                    if (result.status === "found") {
                        const savedState = JSON.parse(result.data);
                        setProgram(savedState.activities || {});
                        setCustomSubjects(savedState.subjects || customSubjects);
                    }
                    setUser(formData);
                } catch (err) {
                    alert("Bağlantı hatası! SCRIPT_URL doğru mu? Dobby üzgün... Miyav!");
                } finally { setLoading(false); }
            };

            const saveToCloud = async (newProgram, newSubjects) => {
                const dataToSave = { ...user, state: { activities: newProgram, subjects: newSubjects } };
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataToSave) });
                } catch (e) { console.error("Kayıt hatası miyav!"); }
            };

            const updateCell = (day, idx, value) => {
                const key = `day${day}_sub${idx}`;
                const newProgram = { ...program, [key]: value };
                setProgram(newProgram);
                saveToCloud(newProgram, customSubjects);
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700 text-center">
                            <div className="text-7xl mb-6 drop-shadow-lg">🐈‍⬛</div>
                            <h1 className="text-2xl font-bold text-yellow-500 mb-2">Dobby Koçluk Girişi</h1>
                            <p className="text-slate-400 text-sm mb-8 italic">"Miyav! Bilgilerini gir, çalışma porsiyonlarını hazırlayalım."</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input required placeholder="Ad Soyad" className="w-full bg-slate-900 p-4 rounded-xl outline-none focus:ring-2 ring-yellow-500 transition-all" onChange={e => setFormData({...formData, name: e.target.value})} />
                                <div className="flex gap-4">
                                    <select className="flex-1 bg-slate-900 p-4 rounded-xl border-none outline-none" onChange={e => setFormData({...formData, class: e.target.value})}>
                                        <option value="8">8. Sınıf (LGS)</option>
                                        <option value="7">7. Sınıf</option>
                                        <option value="6">6. Sınıf</option>
                                        <option value="5">5. Sınıf</option>
                                    </select>
                                    <input required type="number" placeholder="Okul No" className="flex-1 bg-slate-900 p-4 rounded-xl outline-none" onChange={e => setFormData({...formData, no: e.target.value})} />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl hover:bg-yellow-400 active:scale-95 transition-all">
                                    {loading ? "Pati İzleri Takip Ediliyor..." : "Dobby'yi Çağır"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const today = new Date().getDay();
            const currentDayIndex = today === 0 ? 7 : today;

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-10 bg-slate-800 p-6 rounded-3xl shadow-xl border border-slate-700 gap-4">
                        <div className="flex items-center gap-5">
                            <div className="text-5xl">🐈‍⬛</div>
                            <div>
                                <h2 className="text-2xl font-bold text-yellow-500">{user.name}</h2>
                                <p className="text-sm text-slate-400 font-semibold uppercase tracking-widest">
                                    {user.class}. Sınıf {user.class === '8' ? 'LGS Maratonu' : 'Başarı Yolculuğu'}
                                </p>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setEditMode(!editMode)} className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${editMode ? 'bg-green-600' : 'bg-slate-700 hover:bg-slate-600'}`}>
                                {editMode ? "Dersleri Kaydet" : "Ders İsimlerini Değiştir"}
                            </button>
                            <button onClick={() => window.location.reload()} className="bg-red-900/50 px-4 py-2 rounded-xl text-xs hover:bg-red-800">Çıkış</button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-7 gap-4">
                        {[1, 2, 3, 4, 5, 6, 7].map(day => {
                            const isPast = day < currentDayIndex;
                            const isToday = day === currentDayIndex;
                            const dayNames = ["", "Pazartesi", "Salı", "Çarşamba", "Perşembe", "Cuma", "Cumartesi", "Pazar"];

                            return (
                                <div key={day} className={`bg-slate-800 p-5 rounded-2xl border transition-all ${isToday ? 'border-yellow-500 ring-2 ring-yellow-500/20 scale-105 z-10' : 'border-slate-700'} ${isPast ? 'locked-card' : ''}`}>
                                    <div className="text-center mb-6">
                                        <span className="text-[10px] text-slate-500 block uppercase font-bold tracking-tighter">{dayNames[day]}</span>
                                        <h3 className="font-bold text-lg">{day}. GÜN</h3>
                                    </div>
                                    
                                    <div className="space-y-5">
                                        {customSubjects.map((sub, idx) => (
                                            <div key={idx} className="group">
                                                {editMode ? (
                                                    <input value={sub} className="w-full bg-slate-900 text-[11px] p-2 rounded-lg border border-slate-700 outline-none focus:border-green-500"
                                                        onChange={(e) => {
                                                            const newSubs = [...customSubjects];
                                                            newSubs[idx] = e.target.value;
                                                            setCustomSubjects(newSubs);
                                                            saveToCloud(program, newSubs);
                                                        }}
                                                    />
                                                ) : (
                                                    <div className="flex justify-between items-center mb-1 px-1">
                                                        <label className="text-[10px] text-slate-400 font-bold uppercase truncate max-w-[80px]">{sub}</label>
                                                        {program[`day${day}_sub${idx}`] > 0 && <span className="text-[8px] text-yellow-500">✔</span>}
                                                    </div>
                                                )}
                                                <input type="number" placeholder="Soru Sayısı" 
                                                    className="w-full bg-slate-900 p-3 rounded-xl text-sm outline-none focus:ring-2 ring-yellow-500 transition-all border border-transparent"
                                                    value={program[`day${day}_sub${idx}`] || ''}
                                                    onChange={(e) => updateCell(day, idx, e.target.value)}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {isToday && (
                                        <div className="mt-6 p-3 bg-yellow-500/10 rounded-xl border border-yellow-500/20 text-[10px] text-yellow-200 text-center leading-tight">
                                            <strong>Dobby Diyor Ki:</strong><br/>
                                            {user.class === '8' ? '"LGS patiyle değil, soru çözerek kazanılır!"' : '"Bugünkü porsiyonunu bitirmeyi unutma!"'}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <footer className="mt-12 p-8 bg-slate-800 rounded-3xl border border-slate-700 flex flex-col md:flex-row items-center gap-8 shadow-inner">
                        <div className="text-6xl animate-bounce">🐈‍⬛</div>
                        <div className="flex-1 text-center md:text-left">
                            <h4 className="font-bold text-xl text-yellow-500 mb-2">Haftalık Analiz & Dobby Notları</h4>
                            <p className="text-sm text-slate-300 leading-relaxed italic">
                                {user.class === '8' 
                                    ? "LGS öğrencisiysen her yanlış bir fırsattır miyav! Boş bıraktığın soruların üzerine git. Bu tablo senin öğretmenine (Mustafa Hocam'a) anlık olarak gidiyor, bizi şaşırt!" 
                                    : "Gelişim yolculuğunda her gün bir adımdır. Bugünün hedeflerini tamamla, yarının Dobby'sini mutlu et."}
                            </p>
                        </div>
                    </header>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
