<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobby LGS & Ders Koçu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .locked-card { opacity: 0.6; pointer-events: none; filter: grayscale(1); }
        .dobby-bubble { position: relative; background: #1e293b; border: 2px solid #334155; }
        .dobby-bubble::after { content: ''; position: absolute; left: -10px; top: 20px; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-right: 10px solid #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- AYARLAR ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwPLYlWJcdLBLLgLzZxhrZUvRmGA-r4uE2Bc3x5dMrcpPsLayysx-nqRseHLinugHa0/exec";

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(false);
            const [program, setProgram] = useState({});
            const [editMode, setEditMode] = useState(false);
            const [customSubjects, setCustomSubjects] = useState(["Türkçe", "Matematik", "Fen Bilimleri", "İngilizce", "Sosyal", "Din Kültürü"]);

            // Giriş Ekranı Formu
            const [formData, setFormData] = useState({ name: '', class: '8', no: '' });

            // Giriş Yap ve Verileri Çek
            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const resp = await fetch(`${SCRIPT_URL}?no=${formData.no}&class=${formData.class}`);
                    const result = await resp.json();
                    if (result.status === "found") {
                        const savedState = JSON.parse(result.data);
                        setProgram(savedState.activities || {});
                        setCustomSubjects(savedState.subjects || customSubjects);
                    }
                    setUser(formData);
                } catch (err) {
                    alert("Bağlantı hatası! Dobby üzgün... Miyav!");
                } finally { setLoading(false); }
            };

            // Veriyi Kaydet
            const saveToCloud = async (newProgram, newSubjects) => {
                const dataToSave = {
                    ...user,
                    state: { activities: newProgram, subjects: newSubjects }
                };
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(dataToSave)
                });
            };

            // Hücre Güncelleme
            const updateCell = (day, type, value) => {
                const newProgram = { ...program, [`${day}_${type}`]: value };
                setProgram(newProgram);
                saveToCloud(newProgram, customSubjects);
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700">
                            <div className="text-center mb-8">
                                <div className="text-6xl mb-4">🐈‍⬛</div>
                                <h1 className="text-2xl font-bold text-yellow-500">Dobby Koçluk Girişi</h1>
                                <p className="text-slate-400 text-sm">Miyav! Bilgilerini gir, hemen başlayalım.</p>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input required placeholder="Ad Soyad" className="w-full bg-slate-900 p-4 rounded-xl outline-none focus:ring-2 ring-yellow-500" onChange={e => setFormData({...formData, name: e.target.value})} />
                                <div className="flex gap-4">
                                    <select className="flex-1 bg-slate-900 p-4 rounded-xl" onChange={e => setFormData({...formData, class: e.target.value})}>
                                        <option value="8">8. Sınıf (LGS)</option>
                                        <option value="7">7. Sınıf</option>
                                        <option value="6">6. Sınıf</option>
                                        <option value="5">5. Sınıf</option>
                                    </select>
                                    <input required type="number" placeholder="Okul No" className="flex-1 bg-slate-900 p-4 rounded-xl outline-none" onChange={e => setFormData({...formData, no: e.target.value})} />
                                </div>
                                <button type="submit" disabled={loading} className="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl hover:bg-yellow-400 transition-all">
                                    {loading ? "Pati İzleri Takip Ediliyor..." : "Programa Devam Et"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const today = new Date().getDay(); // 0-6 (Pazar-Cumartesi)
            // Haftalık sıralama (Pazartesi 1... Pazar 7 olsun diye düzenleme)
            const currentDayIndex = today === 0 ? 7 : today;

            return (
                <div className="max-w-6xl mx-auto p-6">
                    <header className="flex justify-between items-center mb-10 bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
                        <div className="flex items-center gap-4">
                            <div className="text-4xl">🐈‍⬛</div>
                            <div>
                                <h2 className="text-xl font-bold">Selam, {user.name}!</h2>
                                <p className="text-xs text-slate-400">{user.class}. Sınıf {user.class === '8' ? 'LGS Maratonu' : 'Gelişim Programı'}</p>
                            </div>
                        </div>
                        <button onClick={() => setEditMode(!editMode)} className="bg-slate-700 px-4 py-2 rounded-lg text-sm hover:bg-slate-600">
                            {editMode ? "Dersleri Kilitle" : "Ders İsimlerini Düzenle"}
                        </button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-7 gap-4">
                        {[1, 2, 3, 4, 5, 6, 7].map(day => {
                            const isPast = day < currentDayIndex;
                            const isToday = day === currentDayIndex;
                            
                            return (
                                <div key={day} className={`bg-slate-800 p-4 rounded-2xl border ${isToday ? 'border-yellow-500 shadow-lg scale-105' : 'border-slate-700'} ${isPast ? 'locked-card' : ''}`}>
                                    <h3 className="font-bold mb-4 text-center border-b border-slate-700 pb-2">
                                        {day}. Gün {isToday && "📍"}
                                    </h3>
                                    
                                    <div className="space-y-4">
                                        {customSubjects.map((sub, idx) => (
                                            <div key={idx} className="space-y-1">
                                                {editMode ? (
                                                    <input 
                                                        value={sub} 
                                                        className="w-full bg-slate-900 text-[10px] p-1 rounded"
                                                        onChange={(e) => {
                                                            const newSubs = [...customSubjects];
                                                            newSubs[idx] = e.target.value;
                                                            setCustomSubjects(newSubs);
                                                            saveToCloud(program, newSubs);
                                                        }}
                                                    />
                                                ) : (
                                                    <label className="text-[10px] text-slate-500 uppercase font-bold">{sub}</label>
                                                )}
                                                <input 
                                                    type="number" 
                                                    placeholder="Soru" 
                                                    className="w-full bg-slate-900 p-2 rounded-lg text-xs outline-none focus:ring-1 ring-yellow-500"
                                                    value={program[`day${day}_sub${idx}`] || ''}
                                                    onChange={(e) => updateCell(`day${day}_sub${idx}`, '', e.target.value)}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {isToday && (
                                        <div className="mt-4 p-2 bg-yellow-500/10 rounded-lg border border-yellow-500/20 text-[10px] text-yellow-200 italic">
                                            Dobby: "Bugün o {user.class === '8' ? 'LGS' : 'ders'} hedeflerini patileyeceğiz!"
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-10 p-6 bg-slate-800 rounded-2xl border border-slate-700 flex items-start gap-4">
                        <div className="text-4xl">🎓</div>
                        <div>
                            <h4 className="font-bold text-yellow-500">Öğretmen Notu (Mustafa Hocam'dan):</h4>
                            <p className="text-sm text-slate-300">
                                {user.class === '8' 
                                    ? "LGS sürecinde deneme analizlerini ihmal etme. Yanlış yaptığın her soru aslında bir fırsattır." 
                                    : "Düzenli çalışma alışkanlığı başarının yarısıdır. Günlük hedeflerine sadık kal."}
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
